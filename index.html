<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCS Admin Portal</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<style>
body { font-family: 'Segoe UI', sans-serif; }
.question-card { transition: all 0.2s; }
.question-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
.line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
</style>
</head>
<body class="bg-gray-50">
<div id="loginScreen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-600 to-indigo-700">
  <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
    <h1 class="text-3xl font-bold text-center mb-2">PCS Admin Portal</h1>
    <div class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Admin ID</label>
        <input type="text" id="admin_id" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" id="admin_pass" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
      </div>
      <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3.5 rounded-lg transition">Login</button>
    </div>
  </div>
</div>

<div id="dashboard" class="hidden min-h-screen">
  <nav class="bg-white shadow-sm border-b">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-gray-800">Question Manager</h1>
      <div class="flex items-center gap-4">
        <select id="collectionSelect" onchange="loadQuestions()" class="border border-gray-300 rounded-lg px-4 py-2 focus:outline-none">
          <option value="pcsquestions">PCS Questions</option>
          <option value="bookquestions">Book Questions</option>
        </select>
        <button onclick="logout()" class="text-red-600 hover:text-red-700 font-medium flex items-center gap-2">
          <i class="fas fa-sign-out-alt"></i> Logout
        </button>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 py-8">
    <!-- Upload Section -->
    <div class="bg-white rounded-2xl shadow p-6 mb-8">
      <h2 class="text-xl font-semibold mb-4">Upload / Edit Questions (JSON Array)</h2>
      <textarea id="uploadJson" rows="10" class="w-full p-4 border border-gray-300 rounded-xl font-mono text-sm" placeholder='Paste your JSON array here...'></textarea>
      <button onclick="uploadQuestions()" class="mt-4 bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg font-medium">
        Upload / Re-upload Questions
      </button>
    </div>

    <div class="flex justify-between items-center mb-4">
      <h2 class="text-2xl font-semibold">Questions List</h2>
      <button onclick="loadQuestions()" class="text-blue-600 hover:text-blue-700 flex items-center gap-2">
        <i class="fas fa-refresh"></i> Refresh
      </button>
    </div>

    <div id="questionsList" class="space-y-4"></div>
  </div>
</div>

<!-- Edit Single Question Modal -->
<div id="editModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-2xl max-w-2xl w-full mx-4 max-h-[90vh] overflow-auto">
    <div class="p-6 border-b">
      <h3 class="text-xl font-semibold">Edit Question</h3>
    </div>
    <div class="p-6" id="editForm"></div>
    <div class="p-6 border-t flex justify-end gap-3">
      <button onclick="closeModal()" class="px-6 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">Cancel</button>
      <button onclick="saveEdit()" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Save Changes</button>
    </div>
  </div>
</div>

<script>
let token = null;
let currentEditId = null;
let currentCollection = 'pcsquestions';
const API_BASE = 'https://pcsadmin.vercel.app';

async function login() {
  const admin_id = document.getElementById('admin_id').value.trim();
  const admin_pass = document.getElementById('admin_pass').value.trim();
  if (!admin_id || !admin_pass) return alert("Please enter Admin ID and Password");
  
  try {
    const res = await fetch(`${API_BASE}/api/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ admin_id, admin_pass })
    });
    const data = await res.json();
    if (res.ok) {
      token = data.token;
      localStorage.setItem('adminToken', token);
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      loadQuestions();
    } else {
      alert(data.error || 'Login failed');
    }
  } catch (err) {
    alert('Cannot connect to server');
  }
}

function logout() {
  token = null;
  localStorage.removeItem('adminToken');
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
}

function getHeaders() {
  return {
    'Content-Type': 'application/json',
    'Authorization': `Bearer ${token}`
  };
}

// ====================== NEW: Edit Entire Batch ======================
async function editBatch(batchId) {
  if (!confirm(`Edit entire batch ${batchId}?`)) return;
  
  try {
    const res = await fetch(`${API_BASE}/api/admin/questions/${currentCollection}/batch/${batchId}/full`, {
      headers: getHeaders()
    });
    
    if (!res.ok) {
      const err = await res.json();
      return alert(err.error || 'Failed to fetch batch');
    }
    
    const data = await res.json();
    
    // Populate the upload textarea with clean JSON
    document.getElementById('uploadJson').value = JSON.stringify(data.questions, null, 2);
    
    alert(`✅ Batch ${batchId} loaded for editing!\n\nYou can now edit the JSON and click "Upload / Re-upload Questions"`);
    
    // Scroll to upload section
    document.getElementById('uploadJson').scrollIntoView({ behavior: 'smooth' });
    
  } catch (err) {
    alert('Error loading batch for editing');
    console.error(err);
  }
}

// ====================== Existing Functions ======================

async function uploadQuestions() {
  const jsonText = document.getElementById('uploadJson').value.trim();
  if (!jsonText) return alert("Please paste JSON data");
  
  try {
    const data = JSON.parse(jsonText);
    const collection = document.getElementById('collectionSelect').value;
    
    const res = await fetch(`${API_BASE}/api/admin/questions/${collection}`, {
      method: 'POST',
      headers: getHeaders(),
      body: JSON.stringify(data)
    });
    
    const result = await res.json();
    if (res.ok) {
      alert(`✅ ${result.count || 1} question(s) uploaded successfully! Batch ID: ${result.batchId}`);
      document.getElementById('uploadJson').value = '';
      loadQuestions();
    } else {
      alert(result.error || 'Upload failed');
    }
  } catch (err) {
    alert('Invalid JSON format');
  }
}

async function loadQuestions() {
  currentCollection = document.getElementById('collectionSelect').value;
  try {
    const res = await fetch(`${API_BASE}/api/admin/questions/${currentCollection}`, { headers: getHeaders() });
    const questions = await res.json();
    const container = document.getElementById('questionsList');
    container.innerHTML = '';
    
    if (questions.length === 0) {
      container.innerHTML = `<p class="text-gray-500 text-center py-12">No questions found.</p>`;
      return;
    }

    const batchGroups = {};
    questions.forEach(q => {
      if (!batchGroups[q.batchId]) batchGroups[q.batchId] = [];
      batchGroups[q.batchId].push(q);
    });

    Object.keys(batchGroups).forEach(batchId => {
      const batchQuestions = batchGroups[batchId];
      const batchDiv = document.createElement('div');
      batchDiv.className = 'mb-8 border border-gray-200 rounded-2xl p-6 bg-white';
      batchDiv.innerHTML = `
        <div class="flex justify-between items-center mb-4 pb-4 border-b">
          <div>
            <span class="text-sm font-mono bg-gray-100 px-3 py-1 rounded">Batch: ${batchId}</span>
            <span class="ml-3 text-sm text-gray-500">${batchQuestions.length} questions</span>
          </div>
          <div class="flex gap-3">
            <button onclick="editBatch('${batchId}')" class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm rounded-lg flex items-center gap-2">
              <i class="fas fa-edit"></i> Edit Entire Batch
            </button>
            <button onclick="deleteBatch('${batchId}')" class="px-5 py-2 bg-red-600 hover:bg-red-700 text-white text-sm rounded-lg flex items-center gap-2">
              <i class="fas fa-trash"></i> Delete Entire Batch
            </button>
          </div>
        </div>
        <div class="space-y-4" id="batch-${batchId}"></div>
      `;
      container.appendChild(batchDiv);
      
      const batchContainer = document.getElementById(`batch-${batchId}`);
      batchQuestions.forEach(q => {
        const card = document.createElement('div');
        card.className = 'question-card bg-gray-50 border rounded-xl p-5';
        card.innerHTML = `
          <div class="flex justify-between">
            <div class="flex-1">
              <span class="text-xs font-mono bg-white px-2 py-1 rounded">Q.${q._id}</span>
              <h4 class="mt-2 line-clamp-2 font-medium">${q.english.question.substring(0, 120)}...</h4>
              <p class="text-xs text-gray-500 mt-1">${q.exam} • ${q.year} • ${q.paper || ''}</p>
            </div>
            <div class="flex gap-2">
              <button onclick="editQuestion('${q._id}')" class="px-4 py-2 text-blue-600 hover:bg-blue-100 rounded-lg">✏️</button>
              <button onclick="deleteQuestion('${q._id}')" class="px-4 py-2 text-red-600 hover:bg-red-100 rounded-lg">🗑️</button>
            </div>
          </div>
        `;
        batchContainer.appendChild(card);
      });
    });
  } catch (err) {
    alert('Failed to load questions');
  }
}

async function deleteBatch(batchId) {
  if (!confirm(`Delete ALL questions in batch ${batchId}?`)) return;
  try {
    const res = await fetch(`${API_BASE}/api/admin/questions/${currentCollection}/batch/${batchId}`, {
      method: 'DELETE',
      headers: getHeaders()
    });
    if (res.ok) {
      alert('Batch deleted successfully');
      loadQuestions();
    } else {
      alert('Delete failed');
    }
  } catch (err) {
    alert('Error deleting batch');
  }
}

// ... (rest of your existing functions remain unchanged)
async function editQuestion(id) {
  currentEditId = id;
  try {
    const res = await fetch(`${API_BASE}/api/admin/questions/${currentCollection}/${id}`, { headers: getHeaders() });
    const q = await res.json();
    const formHTML = `
      <div class="grid grid-cols-2 gap-4">
        <div><label class="block text-sm font-medium mb-1">Exam</label><input id="edit_exam" value="${q.exam}" class="w-full p-3 border rounded-lg"></div>
        <div><label class="block text-sm font-medium mb-1">Year</label><input id="edit_year" type="number" value="${q.year}" class="w-full p-3 border rounded-lg"></div>
      </div>
      <div class="mt-4"><label class="block text-sm font-medium mb-1">Paper</label><input id="edit_paper" value="${q.paper || ''}" class="w-full p-3 border rounded-lg"></div>
      <div class="mt-4"><label class="block text-sm font-medium mb-1">Question No (_id)</label><input id="edit_qno" type="number" value="${q._id}" class="w-full p-3 border rounded-lg"></div>
      <div class="mt-6"><h4 class="font-semibold mb-2">English</h4><textarea id="edit_eng_q" rows="3" class="w-full p-3 border rounded-lg">${q.english.question}</textarea></div>
      <div class="mt-6"><h4 class="font-semibold mb-2">Hindi</h4><textarea id="edit_hin_q" rows="3" class="w-full p-3 border rounded-lg">${q.hindi.question}</textarea></div>
      <div class="mt-6 grid grid-cols-3 gap-4">
        <div><label class="block text-sm">Marks</label><input id="edit_marks" type="number" value="${q.marks}" class="w-full p-3 border rounded-lg"></div>
        <div><label class="block text-sm">Negative Marks</label><input id="edit_neg" type="number" value="${q.negativeMarks}" step="0.01" class="w-full p-3 border rounded-lg"></div>
        <div><label class="block text-sm">Correct Answer</label><input id="edit_answer" type="number" value="${q.correct_answer}" class="w-full p-3 border rounded-lg"></div>
      </div>
    `;
    document.getElementById('editForm').innerHTML = formHTML;
    document.getElementById('editModal').classList.remove('hidden');
  } catch (err) {
    alert('Failed to load question');
  }
}

async function saveEdit() {
  const data = {
    exam: document.getElementById('edit_exam').value,
    year: parseInt(document.getElementById('edit_year').value),
    paper: document.getElementById('edit_paper').value,
    _id: parseInt(document.getElementById('edit_qno').value),
    english: { question: document.getElementById('edit_eng_q').value },
    hindi: { question: document.getElementById('edit_hin_q').value },
    marks: parseFloat(document.getElementById('edit_marks').value),
    negativeMarks: parseFloat(document.getElementById('edit_neg').value),
    correct_answer: parseInt(document.getElementById('edit_answer').value)
  };
  try {
    const res = await fetch(`${API_BASE}/api/admin/questions/${currentCollection}/${currentEditId}`, {
      method: 'PATCH',
      headers: getHeaders(),
      body: JSON.stringify(data)
    });
    if (res.ok) {
      alert('Question updated');
      closeModal();
      loadQuestions();
    }
  } catch (err) {
    alert('Save failed');
  }
}

function closeModal() {
  document.getElementById('editModal').classList.add('hidden');
}

async function deleteQuestion(id) {
  if (!confirm('Delete this question?')) return;
  try {
    const res = await fetch(`${API_BASE}/api/admin/questions/${currentCollection}/${id}`, {
      method: 'DELETE',
      headers: getHeaders()
    });
    if (res.ok) {
      alert('Question deleted');
      loadQuestions();
    }
  } catch (err) {
    alert('Delete failed');
  }
}

window.onload = () => {
  const savedToken = localStorage.getItem('adminToken');
  if (savedToken) {
    token = savedToken;
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    loadQuestions();
  }
};
</script>
</body>
</html>
